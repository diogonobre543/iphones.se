<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iStore | Alle Produkter</title>
    <link rel="stylesheet" href="Assets/style.css">
</head>
<body class="bg-light">

    <header class="site-header">
        <div class="container header-grid">
            <a href="index.html" class="logo">iStore</a>
            <nav class="main-nav">
                <a href="index.html">Forside</a>
                <a href="products.html" class="active">Produkter</a>
                <a href="about.html">Om os</a>
            </nav>
        </div>
    </header>

    <nav class="filter-bar">
        <div class="container">
            <div class="filter-wrapper" id="filterContainer">
                </div>
        </div>
    </nav>

    <main class="container">
        <div class="search-container">
            <input type="text" id="searchField" class="apple-search" placeholder="Søg efter MacBook, iPhone eller iPad...">
        </div>

        <div id="productGrid" class="apple-grid">
            </div>
    </main>

    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            
            <div id="modalBody" class="modal-grid">
                </div>
        </div>
    </div>

    <footer class="apple-footer">
        <div class="container">
            <p>&copy; 2026 iStore Danmark. Alle rettigheder forbeholdes.</p>
            <p style="margin-top: 10px; opacity: 0.5;">Autoriseret forhandler af Apple produkter.</p>
        </div>
    </footer>

    <script src="Assets/script.js"></script>
</body>
</html>
