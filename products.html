<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iStore | Alla produkter</title>
    <link rel="stylesheet" href="Assets/style.css">
</head>
<body>

    <header class="site-header">
        <div class="container header-grid">
            <a href="index.html" class="logo">iStore</a>
            <nav class="main-nav">
                <a href="index.html">Startsida</a>
                <a href="products.html" class="active">Produkter</a>
                <a href="about.html">Om oss</a>
            </nav>
            </div>
    </header>

    <nav class="filter-bar">
        <div class="container">
            <div class="filter-wrapper" id="filterContainer">
                </div>
        </div>
    </nav>

    <main class="container" style="padding-top: 20px;">
        <div class="search-container">
            <input type="text" id="searchField" class="apple-search" placeholder="Sök efter MacBook, iPhone eller iPad...">
        </div>

        <div id="productGrid" class="apple-grid">
            </div>
    </main>

    <div id="productModal" class="modal">
        <div class="modal-content">
            <div id="modalBody">
                </div>
        </div>
    </div>

    <footer class="apple-footer" style="padding: 60px 20px; text-align: center; background: #1d1d1f; color: white; margin-top: 60px;">
        <div class="container" style="display: flex; flex-direction: column; align-items: center; gap: 20px;">
            <div style="font-size: 1.2rem; font-weight: 600;">iStore Support</div>
            
            <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; margin: 10px 0;">
                <div style="color: #0071e3; font-weight: 600;">📞 08 12410666</div>
                <div>✉️ <a href="mailto:order@itreservdelar.se" style="color: white; text-decoration: underline; opacity: 0.8;">order@itreservdelar.se</a></div>
            </div>

            <div style="font-size: 0.85rem; opacity: 0.7; line-height: 1.8; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; width: 100%; max-width: 400px;">
                <div style="font-weight: 700; margin-bottom: 5px; text-transform: uppercase;">Öppettider</div>
                <div>Måndag - Torsdag: 09:00 - 16:00</div>
                <div>Fredag: 09:00 - 15:00</div>
            </div>

            <p style="margin-top: 20px; font-size: 0.8rem; opacity: 0.4;">&copy; 2026 iStore Sverige. Auktoriserad återförsäljare.</p>
        </div>
    </footer>

    <script src="Assets/script.js"></script>
</body>
</html>
